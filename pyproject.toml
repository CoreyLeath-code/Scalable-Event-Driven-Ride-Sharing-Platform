[tool.black]
line-length = 100

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = [".", "tests"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.coverage.run]
source = ["."]
omit = [
    ".git/*",
    "benchmarks/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff.lint]
per-file-ignores = { "benchmarks/*.py" = ["E402"] }
