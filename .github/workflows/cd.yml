name: CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Build and Publish API Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ride-sharing-platform:latest
            ghcr.io/${{ github.repository_owner }}/ride-sharing-platform:${{ github.sha }}

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## CD Summary"
            echo ""
            echo "- Image: ghcr.io/${{ github.repository_owner }}/ride-sharing-platform"
            echo "- Dockerfile: Dockerfile"
          } >> "$GITHUB_STEP_SUMMARY"
