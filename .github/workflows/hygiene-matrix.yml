name: "System Hygiene & Core Engine Verification Matrix"

on:
  push:
    branches: ["main", "development"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  code-hygiene:
    name: "Code Quality Assurance"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Enforce formatting and linting
        run: |
          black --check . --line-length=100
          ruff check .

      - name: Hygiene summary
        if: always()
        run: |
          {
            echo "## Code Hygiene Summary"
            echo ""
            echo "- Formatter: black"
            echo "- Linter: ruff"
          } >> "$GITHUB_STEP_SUMMARY"

  core-engine-matrix:
    name: "Core Engine Tests (${{ matrix.python-version }})"
    needs: [code-hygiene]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing

      - name: Test summary
        if: always()
        run: |
          {
            echo "## Core Engine Test Summary"
            echo ""
            echo "- Python: ${{ matrix.python-version }}"
            echo "- Test command: pytest --cov=. --cov-report=term-missing"
          } >> "$GITHUB_STEP_SUMMARY"

  latency-tracking:
    name: "Performance Benchmarking"
    needs: [core-engine-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Track matching and event latency
        run: python benchmarks/ride_sharing_benchmarks.py --iterations 500 --driver-count 100 --output benchmark-results.json

      - name: Validate benchmark JSON
        run: python -m json.tool benchmark-results.json > /tmp/benchmark-results.pretty.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: hygiene-matrix-benchmark-results
          path: benchmark-results.json

      - name: Benchmark summary
        if: always()
        run: |
          {
            echo "## Benchmark Summary"
            echo ""
            echo "- Harness: benchmarks/ride_sharing_benchmarks.py"
            echo "- Output: benchmark-results.json"
          } >> "$GITHUB_STEP_SUMMARY"

  sast-scan:
    name: "SAST Code Scan"
    needs: [code-hygiene]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "python"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: SAST summary
        if: always()
        run: |
          {
            echo "## SAST Summary"
            echo ""
            echo "- Engine: CodeQL"
            echo "- Language: Python"
          } >> "$GITHUB_STEP_SUMMARY"

  security-shield:
    name: "Security Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scanning guard
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

      - name: Security summary
        if: always()
        run: |
          {
            echo "## Security Summary"
            echo ""
            echo "- Secret scanner: TruffleHog"
            echo "- Mode: verified findings only"
          } >> "$GITHUB_STEP_SUMMARY"

  schema-validation:
    name: "Ingestion Schema Validation"
    needs: [code-hygiene]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt openapi-spec-validator

      - name: Verify event schema imports
        run: python -m compileall shared services

      - name: Schema summary
        if: always()
        run: |
          {
            echo "## Schema Validation Summary"
            echo ""
            echo "- Scope: shared event schemas and service modules"
          } >> "$GITHUB_STEP_SUMMARY"
