name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-benchmark:
    name: Lint, Test, and Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Format check
        run: black --check . --line-length=100

      - name: Lint
        run: ruff check .

      - name: Type check
        run: |
          mypy models.py utils.py event_bus.py location_store.py matching_engine.py pricing_engine.py consumer.py \
            --ignore-missing-imports

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing

      - name: Run benchmark harness
        run: python benchmarks/ride_sharing_benchmarks.py --iterations 250 --driver-count 100 --output benchmark-results.json

      - name: Validate benchmark JSON
        run: python -m json.tool benchmark-results.json > /tmp/benchmark-results.pretty.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: ride-sharing-benchmark-results
          path: benchmark-results.json

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Python: 3.11"
            echo "- Checks: black, ruff, mypy, pytest"
            echo "- Benchmark artifact: benchmark-results.json"
          } >> "$GITHUB_STEP_SUMMARY"
